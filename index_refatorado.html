<!DOCTYPE html>

<head>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;

      color: #333;
    }

    /* Link de acessibilidade */
    .skip-link {
      position: absolute;
      top: -40px;
      left: 0;
      background: #000;
      color: #fff;
      padding: 8px;
      z-index: 100;
    }

    .skip-link:focus {
      top: 0;
    }

    header {
      background-color: #f8f8f8;
      padding: 20px;
      text-align: center;
    }

    header h1 {
      font-size: 28px;
      margin: 0;
      color: #333;
    }

    nav ul {
      list-style: none;
      padding: 0;
      margin: 15px 0 0 0;
      display: flex;
      justify-content: center;
      gap: 15px;
    }

    nav a {
      text-decoration: none;
      color: #007bff;
      font-weight: bold;
      padding: 5px 10px;
      border-radius: 4px;
    }

    nav a:hover,
    nav a:focus,
    nav a[aria-current="page"] {
      background-color: #0056b3;
      color: #fff;
      outline: none;
    }

    main {
      padding: 20px;
    }

    h2 {
      font-size: 24px;
      color: #555;
      margin-bottom: 15px;
    }

    h3 {
      font-size: 20px;
      color: #777;
      margin-top: 20px;
    }

    figure {
      margin: 20px 0;
      text-align: center;
    }

    figure img {
      max-width: 100%;
      height: auto;
      border-radius: 8px;
    }

    figcaption {
      font-size: 14px;
      color: #666;
      margin-top: 8px;
    }

    footer {
      background-color: #222;
      color: #fff;
      padding: 15px;
      text-align: center;
      font-size: 14px;
      margin-top: 30px;
    }
  </style>

</head>
